name: Publish
concurrency:
  group: publish
  cancel-in-progress: false

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # changelog + GitHub release
  id-token: write # OIDC for PyPI trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (${TAG}) does not match pyproject version (${PKG})"
            exit 1
          fi
          echo "Tag matches package version: ${PKG}"

      - name: "Build Changelog"
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          failOnError: true
          mode: "COMMIT"
          configurationJson: |
            {
              "template": "## Changelog\n\n#{{UNCATEGORIZED}}",
              "commit_template": "- #{{TITLE}} (#{{MERGE_SHA}})",
              "pr_template": "- #{{TITLE}} by @#{{AUTHOR}} (##{{NUMBER}})"
            }
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: make install

      - name: Build artifacts
        run: make build

      - name: Create the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.build_changelog.outputs.changelog }}
          files: |
            dist/*.whl
            dist/*.tar.gz

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Reads dist/ and authenticates via OIDC trusted publishing.
        # No username/password/token required.
